<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rome Through My Eyes</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f8f8f8;
    color: #333;
}

h1 {
    text-align: center;
    margin: 40px 0 10px;
    font-weight: 300;
    letter-spacing: 2px;
}

p.subtitle {
    text-align: center;
    margin-bottom: 40px;
    color: #777;
}

.gallery {
    column-count: 3;
    column-gap: 15px;
    max-width: 1100px;
    margin: auto;
    padding: 0 20px 40px;
}

.gallery img {
    width: 100%;
    margin-bottom: 15px;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.3s ease, opacity 0.3s ease;
}

.gallery img:hover {
    transform: scale(1.03);
    opacity: 0.9;
}

@media (max-width: 900px) {
    .gallery { column-count: 2; }
}

@media (max-width: 600px) {
    .gallery { column-count: 1; }
}

.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    padding-top: 80px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(5px);
}

.modal-content {
    background: white;
    margin: auto;
    padding: 30px;
    border-radius: 15px;
    max-width: 500px;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.close {
    float: right;
    font-size: 22px;
    cursor: pointer;
    color: #999;
}

.close:hover {
    color: black;
}
</style>
</head>

<body>

<h1>Rome Through My Eyes</h1>
<p class="subtitle">A small collection of moments from my trip</p>

<div class="gallery">
    <img src="images/rome1.jpg" onclick="openModal('The Colosseum at golden hour. The light wrapped around the stone like history whispering through time.')" alt="Rome photo 1">
    
    <img src="images/rome2.jpg" onclick="openModal('A quiet morning near the Trevi Fountain before the city fully woke up. It felt almost secret.')" alt="Rome photo 2">
    
    <img src="images/rome3.jpg" onclick="openModal('Wandering through Trastevere, getting lost in warm colors and narrow streets.')" alt="Rome photo 3">
    
    <img src="images/rome4.jpg" onclick="openModal('The Pantheon ceiling — standing beneath it felt surreal.')" alt="Rome photo 4">
</div>

<div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <p id="modalText"></p>
    </div>
</div>

<script>
function openModal(text) {
    document.getElementById("modalText").innerText = text;
    document.getElementById("myModal").style.display = "block";
}

function closeModal() {
    document.getElementById("myModal").style.display = "none";
}

window.onclick = function(event) {
    let modal = document.getElementById("myModal");
    if (event.target === modal) {
        modal.style.display = "none";
    }
}
</script>

</body>
</html>
